version = 0.1

[default]
[default.global.parameters]
stack_name = "highland-oak-dev"

[default.build.parameters]
use_container = true
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
s3_prefix = "highland-oak"
region = "us-east-1"
parameter_overrides = "Stage=dev AllowedOrigin=http://localhost:3002"

[prod]
[prod.deploy.parameters]
stack_name = "highland-oak-prod"
confirm_changeset = false
parameter_overrides = "Stage=prod"
