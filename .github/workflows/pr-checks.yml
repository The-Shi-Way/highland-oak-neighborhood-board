name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint-frontend:
    name: Frontend Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build check
        run: bun run build
        env:
          VITE_API_URL: ""

  lint-backend:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Check syntax of all Lambda functions
        run: |
          find functions lib -name "*.mjs" -exec node --check {} \;
